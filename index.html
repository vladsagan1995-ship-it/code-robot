<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#7c3aed">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CodeBot">
  <meta name="description" content="Навчися Python, програмуючи робота у лабіринті!">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon.svg">
  <link rel="icon" href="./icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
  <title>🤖 Code Robot</title>
</head>
<body>

<!-- ── MENU SCREEN ────────────────────────────────────────────────────── -->
<section id="screen-menu" class="screen">
  <div class="menu-header">
    <div class="logo-emoji">🤖</div>
    <h1>Code Robot</h1>
    <p>Навчись Python, керуючи роботом у лабіринті!</p>
  </div>
  <div id="level-cards"></div>
</section>

<!-- ── GAME SCREEN ────────────────────────────────────────────────────── -->
<section id="screen-game" class="screen hidden">

  <!-- Top bar -->
  <div class="game-topbar">
    <button id="btn-back" class="icon-btn" title="Назад до меню">←</button>
    <span id="level-title">Рівень 1</span>
    <button id="btn-hint" class="icon-btn" title="Підказка">💡</button>
  </div>

  <!-- Game body: world left/top, code right/bottom -->
  <div class="game-body">

    <!-- World (grid) -->
    <div id="world-wrap">
      <div id="level-desc"></div>
      <div id="world-grid"></div>
    </div>

    <!-- Code panel -->
    <div id="code-panel">

      <!-- Concept + chips -->
      <div class="code-header">
        <div id="concept-badge">💡</div>
        <div class="chips-label">Команди:</div>
        <div id="cmd-chips"></div>
      </div>

      <!-- Editor -->
      <div class="editor-wrap">
        <textarea
          id="code-input"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          placeholder="# Напиши свій код тут..."
        ></textarea>
      </div>

      <!-- Error banner -->
      <div id="error-banner" class="hidden"></div>

      <!-- Run controls -->
      <div class="run-controls">
        <button id="btn-reset" title="Скинути">↺ Скинути</button>
        <button id="btn-run">▶  Запустити!</button>
      </div>

      <!-- Speed + line count -->
      <div class="speed-row">
        <span class="speed-label">🐢</span>
        <input id="speed-slider" type="range" min="1" max="3" value="2" step="1">
        <span class="speed-label">⚡</span>
        <span id="lines-count" style="margin-left:8px"></span>
      </div>

    </div><!-- /code-panel -->
  </div><!-- /game-body -->
</section>

<!-- ── WIN SCREEN ─────────────────────────────────────────────────────── -->
<section id="screen-win" class="screen hidden">
  <div class="win-card">
    <div class="win-trophy">🏆</div>
    <h2 id="win-title">Чудово!</h2>
    <div id="win-stars">⭐⭐⭐</div>
    <p id="win-msg"></p>
    <div class="win-buttons">
      <button id="btn-next"         class="btn-primary">Наступний рівень →</button>
      <button id="btn-replay"       class="btn-secondary">↺ Грати знову</button>
      <button id="btn-menu-from-win" class="btn-secondary">☰ Меню</button>
    </div>
  </div>
</section>

<!-- ── HINT MODAL ─────────────────────────────────────────────────────── -->
<div id="hint-modal" class="hidden">
  <div class="hint-card">
    <button id="hint-close">✕</button>
    <h3>💡 Підказка</h3>
    <div id="hint-text"></div>
  </div>
</div>

<!-- Confetti container -->
<div id="confetti-container"></div>

<!-- Scripts -->
<script src="./js/levels.js"></script>
<script src="./js/parser.js"></script>
<script src="./js/executor.js"></script>
<script src="./js/animator.js"></script>
<script src="./js/game.js"></script>

</body>
</html>
